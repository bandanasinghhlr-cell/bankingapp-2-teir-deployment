name: Install Tools

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::720800607391:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Upload script to S3
        run: |
          aws s3 cp scripts/provision-tools.sh \
            s3://720800607391-devops-scripts/provision-tools.sh \
            --region us-east-1

      - name: Run script on fleet via SSM
        id: install
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws s3 cp s3://720800607391-devops-scripts/provision-tools.sh /tmp/provision-tools.sh",
              "chmod +x /tmp/provision-tools.sh",
              "bash /tmp/provision-tools.sh",
              "rm /tmp/provision-tools.sh"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region us-east-1)
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait + Verify
        run: |
          echo "Waiting for installation..."

          for i in {1..20}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.install.outputs.cmd_id }}" \
              --query "CommandInvocations[*].Status" \
              --output text \
              --region us-east-1)

            echo "Attempt $i — Status: $STATUS"

            if echo "$STATUS" | grep -q "InProgress\|Pending"; then
              sleep 20
            else
              break
            fi
          done

          echo ""
          echo "============ INSTALL RESULTS ============"

          aws ssm list-command-invocations \
            --command-id "${{ steps.install.outputs.cmd_id }}" \
            --details \
            --region us-east-1 \
            --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output]" \
            --output text | while IFS=$'\t' read -r instance status output; do
              echo "Instance : $instance"
              echo "Status   : $status"
              echo "Result   :"
              echo "$output" | grep -E "^(Docker|AWSCLI|✅):" || echo "$output" | tail -3
              echo "-----------------------------------------"
            done

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.install.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          [ "$FAILED" -gt 0 ] && \
            echo "::error::Install failed on $FAILED instance(s)!" && \
            exit 1

          echo "✅ All fleet provisioned successfully!"