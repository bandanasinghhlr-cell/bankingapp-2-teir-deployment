name: Deploy SimpleBank

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  VERSION: v1
  REGION: us-east-1
  ECR: 879246538736.dkr.ecr.us-east-1.amazonaws.com
  IMAGE: 879246538736.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simplebank
  S3_BUCKET: s3://879246538736-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: bandanasinghhlr-cell/bankingapp-2-teir-deployment
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879246538736:role/github-action-deploy-role
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR }}

      - name: Build and Push Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Upload docker-compose.yml
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}

      - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }}" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 879246538736.dkr.ecr.us-east-1.amazonaws.com",
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp s3://879246538736-devops-scripts/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
              "docker pull 879246538736.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simplebank:v1",
              "docker stop simplebank 2>/dev/null || true",
              "docker rm simplebank 2>/dev/null || true",
              "cd /home/ubuntu/app && IMAGE_TAG=v1 docker compose up -d",
              "docker ps --filter name=simplebank --format \"{{.Status}}\" | grep -q Up && echo CONTAINER_RUNNING || (echo CONTAINER_FAILED && exit 1)"
            ]}' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Verify Deployment
        run: |
          for i in {1..10}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.deploy.outputs.cmd_id }}" \
              --query "CommandInvocations[*].Status" \
              --output text \
              --region us-east-1)

            echo "[$i] Status: $STATUS"

            if echo "$STATUS" | grep -q "InProgress\|Pending"; then
              sleep 10
            else
              break
            fi
          done

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region us-east-1

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Deployment failed on $FAILED instance(s)"
            exit 1
          fi

          echo "Deployment Successful"