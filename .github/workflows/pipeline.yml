name: Main Pipeline for Orchestrate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify_connection:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read

  deploying:
    needs: verify_connection
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: read